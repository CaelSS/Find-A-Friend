<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700&display=swap" rel="stylesheet">
    <title>Login ou Cadastre-se</title>
    <link rel="stylesheet" href="../css/login.css">
</head>

<body>

    <section class="containers">

        <div class="marca">
            <div class="logo">
                <img src="../img/logo.svg" alt="Logo com img escrito FIND A FRIEND">
                <h1>FindAFriend</h1>

            </div>
            <div class="dogs">
                <img src="../img/dogsRighSide.svg" alt="Varios cachorros animados">
            </div>
        </div>

        <div class="forms">
            <h2 class="titulo2">Boas-vindas!</h2>
            <form action="">

                <div class="formulario">
                    <label for="email">E-mail</label>
                    <input type="email" name="email" id="email" placeholder="email@email.com" >
                </div>

                <div class="formulario">
                    <label for="password">Senha</label>
                    
                    <input type="password" placeholder="*******" name="password" id="password">
                </div>

                <div class="buttons">
                    <button class="btnForm btnLogin" >Login</button>
                    <button class="btnForm btnCadastrar">Cadastrar minha organzação</button>

                </div>

            </form>
        </div>


    </section>

</body>

</html>
